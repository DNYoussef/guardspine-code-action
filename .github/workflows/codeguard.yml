name: CodeGuard Governance
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  codeguard:
    name: GuardSpine CodeGuard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # First-party dogfood intentionally exercises the published @v1 consumer
      # contract; third-party actions are pinned above.
      - uses: DNYoussef/codeguard-action@v1
        with:
          risk_threshold: L3
          rubric: default
          github_token: ${{ github.token }}
          guardspine_api_key: ${{ secrets.GUARDSPINE_API_KEY }}
          guardspine_api_url: https://api.guardspine.dev
          post_comment: "true"
          generate_bundle: "true"
