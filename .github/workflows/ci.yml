name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-and-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements-ci.txt

      - name: Run test suite
        run: python -m pytest -q

  eval-offline:
    runs-on: ubuntu-latest
    needs: unit-and-regression
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.txt

      - name: Run deterministic eval gate (offline, L0)
        run: |
          python eval/run_eval.py --tier L0 --dataset hand-crafted --max-fp 45 --max-fn 5

      - name: Run secrets eval gate (P3 -- deterministic, strict FP/FN)
        run: |
          python eval/datasets/make_secrets_corpus.py
          python eval/run_eval.py --tier L0 --dataset secrets --max-fp 5 --max-fn 5

  eval-online-optional:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: unit-and-regression
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.txt

      - name: Run AI eval gate (online, optional)
        if: env.OPENROUTER_API_KEY != ''
        run: |
          python eval/run_eval.py --tier L2 --dataset hand-crafted --max-fp 45 --max-fn 5
