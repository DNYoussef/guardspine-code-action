name: 'GuardSpine Code'
description: 'AI-aware code governance with cryptographically verifiable evidence bundles'
author: 'GuardSpine'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  risk_threshold:
    description: 'Risk tier threshold for blocking (L0-L4). Changes at or above this level require approval.'
    required: false
    default: 'L3'
  rubric:
    description: 'Policy rubric to evaluate against (soc2, hipaa, pci-dss, or path to custom rubric)'
    required: false
    default: 'default'
  github_token:
    description: 'GitHub token for PR operations'
    required: true
    default: ${{ github.token }}
  post_comment:
    description: 'Post risk summary as PR comment'
    required: false
    default: 'true'
  generate_bundle:
    description: 'Generate evidence bundle artifact'
    required: false
    default: 'true'
  upload_sarif:
    description: 'Upload findings to GitHub Security tab (SARIF)'
    required: false
    default: 'false'
  fail_on_high_risk:
    description: 'Fail the check if risk exceeds threshold'
    required: false
    default: 'false'
  openai_api_key:
    description: 'OpenAI API key for AI-powered analysis (optional)'
    required: false
  anthropic_api_key:
    description: 'Anthropic API key for AI-powered analysis (optional)'
    required: false
  openrouter_api_key:
    description: 'OpenRouter API key for AI-powered analysis (optional) - supports 100+ models'
    required: false
  openrouter_model:
    description: 'Model to use with OpenRouter (e.g., anthropic/claude-sonnet-4, google/gemini-3)'
    required: false
    default: 'anthropic/claude-sonnet-4.5'
  ollama_host:
    description: 'Ollama server URL for local/on-prem AI (e.g., http://localhost:11434)'
    required: false
  ollama_model:
    description: 'Model to use with Ollama (e.g., llama3.3, codellama, mistral)'
    required: false
    default: 'llama3.3'
  model_1:
    description: 'First AI model for L1+ reviews. Format: provider/model or just model name'
    required: false
  model_2:
    description: 'Second AI model for L2+ reviews. Format: provider/model or just model name'
    required: false
  model_3:
    description: 'Third AI model for L3+ reviews. Format: provider/model or just model name'
    required: false
  ai_review:
    description: 'Enable AI-powered code review (requires at least one API key)'
    required: false
    default: 'true'
  pii_shield_enabled:
    description: 'Enable PII-Shield preprocessing for AI review input'
    required: false
    default: 'false'
  pii_shield_mode:
    description: 'PII-Shield mode: auto, local, or remote'
    required: false
    default: 'auto'
  pii_shield_endpoint:
    description: 'Optional PII-Shield HTTP endpoint for remote redaction'
    required: false
  pii_shield_api_key:
    description: 'API key for PII-Shield endpoint (optional)'
    required: false
  pii_shield_timeout:
    description: 'PII-Shield HTTP timeout in seconds'
    required: false
    default: '5'
  pii_shield_fail_closed:
    description: 'Fail workflow if PII-Shield redaction errors occur (recommended: true for production)'
    required: false
    default: 'true'
  pii_shield_salt_fingerprint:
    description: 'Non-secret salt fingerprint for deterministic redaction attestations (sha256:XXXXXXXX)'
    required: false
    default: 'sha256:00000000'
  pii_safe_regex_list:
    description: 'JSON array of regex patterns that bypass PII-Shield entropy detection (e.g., [{"pattern": "^[a-f0-9]{40,64}$", "name": "SafeGitSHA"}])'
    required: false
    default: '[{"pattern": "^[a-f0-9]{40,64}$", "name": "SafeGitSHA"}, {"pattern": "_hash$", "name": "HashFieldSuffix"}]'
  pii_shield_sanitize_comments:
    description: 'Sanitize PR comments with PII-Shield before publishing'
    required: false
    default: 'true'
  pii_shield_sanitize_bundle:
    description: 'Sanitize evidence bundles with PII-Shield before writing artifacts'
    required: false
    default: 'true'
  pii_shield_sanitize_sarif:
    description: 'Sanitize SARIF output with PII-Shield before upload'
    required: false
    default: 'true'
  rubrics_dir:
    description: 'Directory containing rubric YAML files (relative paths allowed)'
    required: false
    default: '.guardspine/rubrics'
  risk_policy:
    description: 'Path to YAML file defining custom risk patterns/thresholds'
    required: false
  bundle_dir:
    description: 'Directory to write evidence bundles (relative to workspace)'
    required: false
    default: '.guardspine/bundles'
  decision_policy:
    description: 'Decision engine policy (standard, strict, advisory, or path to custom YAML)'
    required: false
    default: 'standard'
  deliberate:
    description: 'Enable deliberation (multi-round cross-checking between AI models)'
    required: false
    default: 'false'
  auto_merge:
    description: 'Auto-merge clean PRs (decision=merge, tier L0-L3). Requires contents:write permission.'
    required: false
    default: 'false'
  auto_merge_method:
    description: 'Merge method: merge, squash, or rebase'
    required: false
    default: 'squash'
  guardspine_api_url:
    description: 'GuardSpine backend URL (e.g., https://app.guardspine.ai/api/v1). Enables dashboard sync and Slack alerts.'
    required: false
  guardspine_api_key:
    description: 'GuardSpine service API key for backend authentication'
    required: false

outputs:
  risk_tier:
    description: 'Assessed risk tier (L0-L4)'
  risk_drivers:
    description: 'JSON array of top risk drivers'
  bundle_path:
    description: 'Path to generated evidence bundle'
  findings_count:
    description: 'Number of policy findings'
  requires_approval:
    description: 'Whether human approval is required (true/false)'
  models_used:
    description: 'Number of AI models that reviewed the change'
  consensus_risk:
    description: 'Multi-model consensus: approve, request_changes, or comment'
  agreement_score:
    description: 'How much models agreed (0.0-1.0)'
  decision:
    description: 'Decision engine verdict: merge, merge-with-conditions, or block'
  verdict:
    description: 'Stable verdict alias (APPROVE | CONDITIONS | BLOCK) mapped from decision for workflows that gate on outputs.verdict.'
  bundle_id:
    description: 'Evidence bundle identifier (empty string if generate_bundle is false). Stable alias for workflows that reference outputs.bundle_id.'
  merged:
    description: 'Whether PR was auto-merged'
  merge_sha:
    description: 'Merge commit SHA (if merged)'

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    INPUT_RISK_THRESHOLD: ${{ inputs.risk_threshold }}
    INPUT_RUBRIC: ${{ inputs.rubric }}
    INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
    INPUT_POST_COMMENT: ${{ inputs.post_comment }}
    INPUT_GENERATE_BUNDLE: ${{ inputs.generate_bundle }}
    INPUT_UPLOAD_SARIF: ${{ inputs.upload_sarif }}
    INPUT_FAIL_ON_HIGH_RISK: ${{ inputs.fail_on_high_risk }}
    INPUT_OPENAI_API_KEY: ${{ inputs.openai_api_key }}
    INPUT_ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
    INPUT_OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}
    INPUT_OPENROUTER_MODEL: ${{ inputs.openrouter_model }}
    INPUT_OLLAMA_HOST: ${{ inputs.ollama_host }}
    INPUT_OLLAMA_MODEL: ${{ inputs.ollama_model }}
    INPUT_MODEL_1: ${{ inputs.model_1 }}
    INPUT_MODEL_2: ${{ inputs.model_2 }}
    INPUT_MODEL_3: ${{ inputs.model_3 }}
    INPUT_AI_REVIEW: ${{ inputs.ai_review }}
    INPUT_DELIBERATE: ${{ inputs.deliberate }}
    INPUT_PII_SHIELD_ENABLED: ${{ inputs.pii_shield_enabled }}
    INPUT_PII_SHIELD_MODE: ${{ inputs.pii_shield_mode }}
    INPUT_PII_SHIELD_ENDPOINT: ${{ inputs.pii_shield_endpoint }}
    INPUT_PII_SHIELD_API_KEY: ${{ inputs.pii_shield_api_key }}
    INPUT_PII_SHIELD_TIMEOUT: ${{ inputs.pii_shield_timeout }}
    INPUT_PII_SHIELD_FAIL_CLOSED: ${{ inputs.pii_shield_fail_closed }}
    INPUT_PII_SHIELD_SALT_FINGERPRINT: ${{ inputs.pii_shield_salt_fingerprint }}
    INPUT_PII_SAFE_REGEX_LIST: ${{ inputs.pii_safe_regex_list }}
    INPUT_PII_SHIELD_SANITIZE_COMMENTS: ${{ inputs.pii_shield_sanitize_comments }}
    INPUT_PII_SHIELD_SANITIZE_BUNDLE: ${{ inputs.pii_shield_sanitize_bundle }}
    INPUT_PII_SHIELD_SANITIZE_SARIF: ${{ inputs.pii_shield_sanitize_sarif }}
    INPUT_RUBRICS_DIR: ${{ inputs.rubrics_dir }}
    INPUT_RISK_POLICY: ${{ inputs.risk_policy }}
    INPUT_BUNDLE_DIR: ${{ inputs.bundle_dir }}
    INPUT_DECISION_POLICY: ${{ inputs.decision_policy }}
    INPUT_AUTO_MERGE: ${{ inputs.auto_merge }}
    INPUT_AUTO_MERGE_METHOD: ${{ inputs.auto_merge_method }}
    INPUT_GUARDSPINE_API_URL: ${{ inputs.guardspine_api_url }}
    INPUT_GUARDSPINE_API_KEY: ${{ inputs.guardspine_api_key }}
